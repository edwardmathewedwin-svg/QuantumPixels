<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantum Pixel · Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#06060F; --bg2:#0D0D1A; --bg3:#12121F;
      --cyan:#00F5FF; --magenta:#FF2FD4; --purple:#7B2FFF; --orange:#FF8C00;
      --text:#E8E8F0; --text2:#9090B0;
      --border:rgba(0,245,255,0.12);
      --glow:0 0 16px rgba(0,245,255,0.25);
      --r:14px; --font:'DM Sans',sans-serif; --font-h:'Syne',sans-serif;
    }
    html,body { height:100%; font-family:var(--font); background:var(--bg); color:var(--text); overflow:hidden; }

    /* ── Screens ── */
    .screen { display:none; height:100vh; }
    .screen.active { display:flex; }

    /* ══ PICK SCREEN ══ */
    #screen-pick { align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .pick-bg { position:absolute; inset:0; z-index:0; }
    .pick-grid {
      position:absolute; inset:0;
      background-image: linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px);
      background-size:40px 40px;
    }
    .pick-glow { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.15; }
    .g1 { width:500px;height:500px; background:var(--cyan);    top:-100px;left:-100px; }
    .g2 { width:400px;height:400px; background:var(--magenta); bottom:-80px;right:-80px; }
    .pick-wrap { position:relative;z-index:1; display:flex;flex-direction:column;align-items:center; gap:18px;padding:40px 24px;max-width:520px;width:100%;text-align:center; }

    /* Robot */
    .robot-wrap { position:relative;width:100px;height:100px;display:flex;align-items:center;justify-content:center; }
    .robot-ring { position:absolute;border-radius:50%;border:1.5px solid var(--cyan);opacity:0.3;animation:spin 8s linear infinite; }
    .r1{width:100px;height:100px;animation-duration:6s}
    .r2{width:76px;height:76px;animation-duration:10s;animation-direction:reverse;border-color:var(--purple)}
    .r3{width:54px;height:54px;animation-duration:14s;border-color:var(--magenta)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .robot-body { position:relative;z-index:2;width:48px;height:48px;background:linear-gradient(135deg,var(--bg3),#1a1a2e);border:1.5px solid var(--cyan);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:var(--glow); }
    .robot-ears { display:flex;justify-content:space-between;width:54px;position:absolute;top:14px; }
    .ear { width:6px;height:10px;background:var(--cyan);border-radius:3px;opacity:0.7; }
    .robot-face { display:flex;flex-direction:column;align-items:center;gap:5px; }
    .robot-eyes { display:flex;gap:6px; }
    .eye { width:7px;height:7px;background:var(--cyan);border-radius:50%;animation:blink 3s infinite;box-shadow:0 0 6px var(--cyan); }
    .eye:nth-child(2){animation-delay:0.15s}
    @keyframes blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(0.1)}}
    .robot-mouth { width:16px;height:3px;background:var(--magenta);border-radius:2px;opacity:0.8; }

    .pick-title  { font-family:var(--font-h);font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    .pick-tagline{ font-size:0.85rem;color:var(--text2);letter-spacing:0.5px; }
    .pick-q      { font-size:1rem;color:var(--text);font-weight:500; }

    /* Lang cards */
    .lang-cards { display:flex;gap:14px;width:100%; }
    .lcard {
      flex:1;display:flex;flex-direction:column;gap:6px;padding:20px 16px;
      background:rgba(13,13,26,0.9);border:1.5px solid var(--border);border-radius:var(--r);
      cursor:pointer;text-align:left;transition:all 0.2s;position:relative;overflow:hidden;
    }
    .lcard:hover { transform:translateY(-3px);border-color:rgba(0,245,255,0.35);box-shadow:var(--glow); }
    .lcard-top  { display:flex;align-items:center;gap:8px; }
    .lcard-flag { font-size:1.4rem; }
    .lcard-badge{ font-size:0.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:20px; }
    .hin-badge  { background:rgba(0,245,255,0.15);color:var(--cyan);border:1px solid rgba(0,245,255,0.3); }
    .tan-badge  { background:rgba(255,47,212,0.15);color:var(--magenta);border:1px solid rgba(255,47,212,0.3); }
    .lcard-name { font-family:var(--font-h);font-size:1rem;font-weight:700;color:var(--text); }
    .lcard-desc { font-size:0.78rem;color:var(--text2); }
    .lcard-arrow{ font-size:1rem;color:var(--cyan);margin-top:4px;transition:transform 0.2s; }
    .lcard:hover .lcard-arrow { transform:translateX(4px); }
    .pick-foot  { font-size:0.72rem;color:var(--text2); }

    /* ══ CHAT SCREEN ══ */
    #screen-chat { flex-direction:column; }
    .app-layout  { display:flex;height:100vh;overflow:hidden; }

    /* Sidebar */
    .sidebar { width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.25s,min-width 0.25s;overflow:hidden; }
    @media(max-width:680px){ .sidebar{width:0;min-width:0;position:absolute;z-index:100;height:100vh;} .sidebar.open{width:260px;min-width:260px;} }
    .sb-top { padding:18px 16px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px; }
    .sb-brand { display:flex;align-items:center;gap:8px; }
    .sb-robot { font-size:1.2rem; }
    .sb-title { font-family:var(--font-h);font-size:0.95rem;font-weight:700;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    .sb-new { width:100%;padding:9px 0;background:linear-gradient(90deg,var(--cyan),var(--purple));border:none;border-radius:8px;color:#000;font-weight:700;font-size:0.85rem;cursor:pointer;transition:opacity 0.2s; }
    .sb-new:hover { opacity:0.85; }
    .sb-label { padding:12px 16px 4px;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text2); }
    .sb-history { flex:1;overflow-y:auto;padding:4px 8px; }
    .sb-history::-webkit-scrollbar{width:3px} .sb-history::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .sb-empty { padding:16px;font-size:0.8rem;color:var(--text2);text-align:center; }
    .sb-item { display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:0.82rem;color:var(--text2);transition:background 0.15s;white-space:nowrap;overflow:hidden; }
    .sb-item:hover { background:rgba(0,245,255,0.06);color:var(--text); }
    .sb-item.active { background:rgba(0,245,255,0.1);color:var(--cyan); }
    .sb-item-icon { font-size:0.9rem;flex-shrink:0; }
    .sb-item-title { overflow:hidden;text-overflow:ellipsis; }
    .sb-bottom { padding:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px; }
    .sb-switch { width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:0.8rem;cursor:pointer;transition:all 0.2s; }
    .sb-switch:hover { border-color:var(--cyan);color:var(--cyan); }
    .sb-mode { font-size:0.75rem;color:var(--text2);text-align:center;padding:2px 0; }

    /* Chat main */
    .chat-main {
      flex:1;display:flex;flex-direction:column;background:var(--bg);
      background-image: linear-gradient(rgba(0,245,255,0.02) 1px,transparent 1px), linear-gradient(90deg,rgba(0,245,255,0.02) 1px,transparent 1px);
      background-size:32px 32px; overflow:hidden;position:relative;
    }

    /* Topbar */
    .topbar { display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(6,6,15,0.9);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);flex-shrink:0; }
    .tb-menu { background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color 0.2s; }
    .tb-menu:hover { color:var(--cyan); }
    .tb-center { display:flex;align-items:center;gap:10px; }
    .tb-avatar { width:36px;height:36px;background:linear-gradient(135deg,var(--bg3),#1a1a2e);border:1.5px solid var(--cyan);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:var(--glow); }
    .tb-name { font-size:0.88rem;font-weight:600;color:var(--text); }
    .tb-status { font-size:0.72rem;color:var(--text2);display:flex;align-items:center;gap:4px; }
    .sdot { width:6px;height:6px;background:#00ff88;border-radius:50%;box-shadow:0 0 6px #00ff88;animation:spulse 2s infinite; }
    @keyframes spulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .tb-dots { color:var(--text2);letter-spacing:2px;font-size:0.9rem; }

    /* Bot intro */
    .bot-intro { display:flex;flex-direction:column;align-items:center;gap:16px;padding:32px 20px 10px;flex-shrink:0; }
    .bi-robot-wrap { position:relative;width:64px;height:64px;display:flex;align-items:center;justify-content:center; }
    .bi-ring { position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(0,245,255,0.3);animation:spin 6s linear infinite; }
    .bi-robot { font-size:2rem;position:relative;z-index:1; }
    .bi-chips { display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:640px; }
    .chip { padding:8px 14px;background:rgba(13,13,26,0.9);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:0.8rem;cursor:pointer;transition:all 0.2s;font-family:var(--font); }
    .chip:hover { border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,0.06); }

    /* Error */
    .err-bar { margin:8px 16px 0;padding:10px 14px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);border-radius:10px;font-size:0.83rem;color:#ff7070;display:flex;align-items:center;gap:10px;flex-shrink:0; }
    .err-bar.hidden{display:none}
    .retry-btn { margin-left:auto;background:rgba(255,80,80,0.2);border:1px solid rgba(255,80,80,0.4);color:#ff7070;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;transition:background 0.2s; }
    .retry-btn:hover { background:rgba(255,80,80,0.35); }

    /* Chat box */
    .chat-box { flex:1;overflow-y:auto;padding:16px 20px 8px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth; }
    .chat-box::-webkit-scrollbar{width:4px} .chat-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    /* Messages */
    .msg { display:flex;gap:10px;max-width:780px; }
    .msg.user { flex-direction:row-reverse;margin-left:auto; }
    .msg.bot  { margin-right:auto; }
    .msg-avatar { width:32px;height:32px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0; }
    .msg-bubble { padding:11px 15px;border-radius:14px;font-size:0.88rem;line-height:1.6;max-width:72vw; }
    .msg.bot  .msg-bubble { background:rgba(13,13,26,0.95);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text); }
    .msg.user .msg-bubble { background:linear-gradient(135deg,rgba(0,245,255,0.15),rgba(123,47,255,0.15));border:1px solid rgba(0,245,255,0.2);border-top-right-radius:4px;color:var(--text); }
    .msg-bubble strong{color:var(--cyan)}
    .msg-bubble code{background:rgba(0,245,255,0.08);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:monospace;font-size:0.82rem;color:var(--cyan)}

    /* Typing */
    .typing-bubble{display:flex;align-items:center;gap:5px;padding:14px 18px!important}
    .dot{width:7px;height:7px;background:var(--cyan);border-radius:50%;animation:bounce 1.2s infinite}
    .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

    /* Input */
    .input-wrap { padding:12px 16px 16px;border-top:1px solid var(--border);background:rgba(6,6,15,0.95);backdrop-filter:blur(10px);flex-shrink:0; }
    .input-bar { display:flex;align-items:flex-end;gap:10px;background:rgba(13,13,26,0.9);border:1.5px solid var(--border);border-radius:14px;padding:10px 10px 10px 16px;transition:border-color 0.2s; }
    .input-bar:focus-within { border-color:rgba(0,245,255,0.4);box-shadow:var(--glow); }
    .msg-in { flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:0.88rem;line-height:1.5;resize:none;max-height:160px;scrollbar-width:none; }
    .msg-in::placeholder{color:var(--text2)}
    .send-btn { width:36px;height:36px;flex-shrink:0;background:linear-gradient(135deg,var(--cyan),var(--purple));border:none;border-radius:10px;color:#000;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.1s;display:flex;align-items:center;justify-content:center; }
    .send-btn:disabled{opacity:0.35;cursor:not-allowed}
    .send-btn:not(:disabled):hover{opacity:0.85;transform:scale(1.05)}
    .foot{font-size:0.68rem;color:var(--text2);text-align:center;padding-top:6px}
    .hidden{display:none!important}

    @media(max-width:520px){
      .lang-cards{flex-direction:column} .pick-title{font-size:1.5rem}
      .msg-bubble{max-width:88vw;font-size:0.84rem} .chat-box{padding:12px 12px 8px}
    }
  </style>
</head>

        <div class="err-bar hidden" id="err-bar">
          <span id="err-txt"></span>
          <button class="retry-btn" onclick="retry()">↺ Retry</button>
        </div>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-wrap">
          <div class="input-bar">
            <textarea id="msg-in" class="msg-in" rows="1" placeholder="Type your question..."
              oninput="onInput(this)" onkeydown="onKey(event)"></textarea>
            <button id="send-btn" class="send-btn" onclick="send()" disabled>↑</button>
          </div>
          <div class="foot">Quantum Pixel · Powered by Groq AI</div>
        </div>
      </main>
    </div>
  </div>

<script>

  /* =====================================================
     ✅ STEP 2B: PASTE YOUR GROQ API KEY
     Get free key at: https://console.groq.com → API Keys
  ===================================================== */
  const GROQ_API_KEY = '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';

  /* ── Config ── */
  const MODEL = 'llama-3.3-70b-versatile';
  const SYSTEM_PROMPTS = {
    hinglish: `Tu ek friendly AI study buddy hai jiska naam "Quantum Pixel" hai. Tu NCERT Class 6 se 12 tak ke students ki help karta hai. Tu Hinglish mein baat karta hai — Hindi aur English ka mix. Simple, clear aur encouraging tone use kar. Examples aur step-by-step explanations de. Emojis use kar thoda fun banane ke liye! 📚✨`,
    tanglish: `Nee oru friendly AI study buddy, unna peyar "Quantum Pixel". Nee NCERT Class 6 la irundhu 12 varai padikira students-a help pannuva. Nee Tanglish la pesuva — Tamil matrum English mix. Simple, clear matrum encouraging tone use pannu. Examples matrum step-by-step explanations kudu. Emojis use pannu! 📚✨`
  };
  const SUGGESTIONS = {
    hinglish: ['📐 Pythagoras theorem explain karo','🧪 Photosynthesis kya hota hai?','📖 Chapter summary chahiye','🔢 Algebra help karo','🌍 French Revolution kya tha?','⚗️ Acids aur Bases samjhao'],
    tanglish: ['📐 Pythagoras theorem sollu','🧪 Photosynthesis enna?','📖 Chapter summary venum','🔢 Algebra help pannu','🌍 French Revolution enna?','⚗️ Acids matrum Bases explain pannu']
  };

  /* ── State ── */
  let lang = null, messages = [], chats = [], activeChatId = null, isLoading = false, lastMsg = '', sidebarOpen = true;

  /* ── Boot ── */
  loadChats();
  const _savedLang = sessionStorage.getItem('qp_lang');
  if (_savedLang) start(_savedLang);

  /* ── Language start ── */
  function start(language) {
    lang = language;
    sessionStorage.setItem('qp_lang', lang);
    document.getElementById('screen-pick').classList.remove('active');
    document.getElementById('screen-chat').classList.add('active');
    document.getElementById('sb-mode').textContent = lang === 'hinglish' ? '🇮🇳 Hinglish Mode' : '🌴 Tanglish Mode';
    renderChips();
    if (!activeChatId) newChat();
    checkGroqKey();
  }

  function checkGroqKey() {
    if (!GROQ_API_KEY || GROQ_API_KEY === 'YOUR_GROQ_API_KEY_HERE')
      showErr('⚠️ Add your Groq API key inside chatbot.html. Get one free at console.groq.com');
  }

  /* ── Chips ── */
  function renderChips() {
    const box = document.getElementById('bi-chips');
    box.innerHTML = '';
    (SUGGESTIONS[lang] || []).forEach(s => {
      const b = document.createElement('button');
      b.className = 'chip'; b.textContent = s;
      b.onclick = () => { document.getElementById('msg-in').value = s; send(); };
      box.appendChild(b);
    });
  }

  /* ── New chat ── */
  function newChat() {
    const id = Date.now().toString();
    chats.unshift({ id, title:'New Chat', lang: lang||'hinglish', messages:[], createdAt: new Date().toISOString() });
    activeChatId = id; messages = [];
    saveChats(); renderHistory(); clearBox(); showIntro(true); hideErr();
  }

  /* ── Send ── */
  async function send() {
    const inp = document.getElementById('msg-in');
    const text = inp.value.trim();
    if (!text || isLoading) return;
    if (!GROQ_API_KEY || GROQ_API_KEY === 'YOUR_GROQ_API_KEY_HERE') { showErr('⚠️ Please add your Groq API key in chatbot.html!'); return; }
    lastMsg = text; inp.value = ''; inp.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    hideErr(); showIntro(false);
    messages.push({ role:'user', content:text });
    addBubble('user', text);
    updateTitle(text);
    const tid = showTyping();
    isLoading = true;
    try {
      const reply = await callGroq(messages);
      removeTyping(tid);
      messages.push({ role:'assistant', content:reply });
      addBubble('bot', reply);
      saveCurrentChat();
    } catch(e) {
      removeTyping(tid);
      showErr('Connection error: ' + (e.message || 'Please try again.'));
    }
    isLoading = false;
  }

  /* ── Groq API ── */
  async function callGroq(msgs) {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+GROQ_API_KEY },
      body: JSON.stringify({ model:MODEL, messages:[{role:'system',content:SYSTEM_PROMPTS[lang]||SYSTEM_PROMPTS.hinglish},...msgs], temperature:0.7, max_tokens:1024 })
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||'API error '+res.status); }
    const d = await res.json();
    return d.choices?.[0]?.message?.content || '(No response)';
  }

  function retry() { if(!lastMsg) return; if(messages.length&&messages[messages.length-1].role==='user'){messages.pop();document.querySelectorAll('.msg.user').forEach((el,i,a)=>{if(i===a.length-1)el.remove();});} document.getElementById('msg-in').value=lastMsg; hideErr(); send(); }

  /* ── DOM helpers ── */
  function addBubble(role, text) {
    const box = document.getElementById('chat-box');
    const d = document.createElement('div'); d.className = 'msg '+role;
    d.innerHTML = role==='bot'
      ? `<div class="msg-avatar">🤖</div><div class="msg-bubble">${fmt(text)}</div>`
      : `<div class="msg-bubble">${esc(text)}</div>`;
    box.appendChild(d); box.scrollTop = box.scrollHeight;
  }
  function fmt(t) { return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\n/g,'<br>'); }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function showTyping() {
    const id='t'+Date.now(), box=document.getElementById('chat-box'), d=document.createElement('div');
    d.className='msg bot'; d.id=id;
    d.innerHTML='<div class="msg-avatar">🤖</div><div class="msg-bubble typing-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    box.appendChild(d); box.scrollTop=box.scrollHeight; return id;
  }
  function removeTyping(id) { const e=document.getElementById(id); if(e) e.remove(); }
  function clearBox() { document.getElementById('chat-box').innerHTML=''; }
  function showIntro(v) { const e=document.getElementById('bot-intro'); if(e) e.style.display=v?'flex':'none'; }
  function showErr(m) { document.getElementById('err-bar').classList.remove('hidden'); document.getElementById('err-txt').textContent=m; }
  function hideErr() { document.getElementById('err-bar').classList.add('hidden'); }

  /* ── Input ── */
  function onInput(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,160)+'px'; document.getElementById('send-btn').disabled=!el.value.trim(); }
  function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }

  /* ── Sidebar ── */
  function toggleSidebar() { sidebarOpen=!sidebarOpen; document.getElementById('sidebar').classList.toggle('open',sidebarOpen); }
  function switchLang() { sessionStorage.removeItem('qp_lang'); lang=null; activeChatId=null; messages=[]; document.getElementById('screen-chat').classList.remove('active'); document.getElementById('screen-pick').classList.add('active'); clearBox(); }

  /* ── History ── */
  function updateTitle(t) { const c=chats.find(x=>x.id===activeChatId); if(c&&c.title==='New Chat'){c.title=t.slice(0,40)+(t.length>40?'…':'');saveChats();renderHistory();} }
  function saveCurrentChat() { const c=chats.find(x=>x.id===activeChatId); if(c){c.messages=[...messages];saveChats();} }
  function renderHistory() {
    const el=document.getElementById('sb-history');
    if(!chats.length){el.innerHTML='<div class="sb-empty">No chats yet</div>';return;}
    el.innerHTML=chats.map(c=>`<div class="sb-item ${c.id===activeChatId?'active':''}" onclick="loadChat('${c.id}')"><span class="sb-item-icon">💬</span><span class="sb-item-title">${esc(c.title)}</span></div>`).join('');
  }
  function loadChat(id) { const c=chats.find(x=>x.id===id); if(!c) return; activeChatId=id; messages=[...c.messages]; lang=c.lang||lang; clearBox(); showIntro(messages.length===0); messages.forEach(m=>addBubble(m.role==='user'?'user':'bot',m.content)); renderHistory(); document.getElementById('sb-mode').textContent=lang==='hinglish'?'🇮🇳 Hinglish Mode':'🌴 Tanglish Mode'; }
  function saveChats() { try{localStorage.setItem('qp_chats',JSON.stringify(chats.slice(0,30)));}catch(e){} }
  function loadChats() { try{const s=localStorage.getItem('qp_chats');if(s)chats=JSON.parse(s);}catch(e){chats=[];} }
</script>
</body>
</html>
